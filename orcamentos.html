function addItem(){
let tbody=document.querySelector('#itens tbody')
let tr=document.createElement('tr')

let select=`<select class='form-select produto'>`+produtos.map(p=>`<option value="${p.name}" data-price="${p.price}" data-type="${p.type}">${p.name}</option>`).join('')+`</select>`

tr.innerHTML=`
<td>${select}</td>
<td><input class="form-control qtd" value="1"></td>
<td><input class="form-control largura"></td>
<td><input class="form-control altura"></td>
<td><input class="form-control m2"></td>
<td><input class="form-control preco"></td>
<td><input class="form-control total"></td>`

tbody.appendChild(tr)
tr.querySelectorAll('input,select').forEach(el=>el.addEventListener('input',()=>calc(tr)))
}

function calc(tr){
let largura=parseFloat(tr.querySelector('.largura').value)||0
let altura=parseFloat(tr.querySelector('.altura').value)||0
let qtd=parseFloat(tr.querySelector('.qtd').value)||1
let preco=parseFloat(tr.querySelector('.preco').value)||0

let m2=(largura/100)*(altura/100)
tr.querySelector('.m2').value=m2.toFixed(3)
tr.querySelector('.total').value=(m2*preco*qtd).toFixed(2)

let esp=0.03
let col=Math.floor(100/(largura+esp))
let lin=Math.floor(100/(altura+esp))
let cabem=col*lin
document.getElementById('aproveitamento').innerText="Cabem "+cabem+" peças em 1m²"
}
